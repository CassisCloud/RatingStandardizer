<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 720" role="img" aria-labelledby="title desc">
  <title>Rating Standardizer simple banner</title>
  <desc>Minimal banner showing multiple rating badges converging to one normalized standard.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#12172b"/>
      <stop offset="100%" stop-color="#28345d"/>
    </linearGradient>
  </defs>
  <rect width="1280" height="720" rx="44" fill="url(#bg)"/>
  <circle cx="1020" cy="130" r="180" fill="#7165ff" opacity="0.1"/>
  <circle cx="210" cy="620" r="220" fill="#00b3ad" opacity="0.12"/>
  <text x="110" y="196" font-family="Segoe UI, Arial, sans-serif" font-size="74" font-weight="800" fill="#ffffff">Rating Standardizer</text>
  <text x="110" y="264" font-family="Segoe UI, Arial, sans-serif" font-size="30" font-weight="500" fill="#c9d3f7">Normalize official ratings across your Jellyfin and Emby libraries.</text>
  <g transform="translate(116 356)">
    <rect width="170" height="112" rx="28" fill="#7165ff"/>
    <text x="85" y="71" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-size="48" font-weight="800" fill="#ffffff">PG</text>
  </g>
  <g transform="translate(328 356)">
    <rect width="170" height="112" rx="28" fill="#00b3ad"/>
    <text x="85" y="71" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-size="44" font-weight="800" fill="#ffffff">12+</text>
  </g>
  <g transform="translate(540 356)">
    <rect width="170" height="112" rx="28" fill="#ff7c4d"/>
    <text x="85" y="71" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-size="44" font-weight="800" fill="#ffffff">TV-14</text>
  </g>
  <path d="M740 412h154" stroke="#d5ddfc" stroke-width="22" stroke-linecap="round"/>
  <path d="M850 360l82 52-82 52" fill="none" stroke="#d5ddfc" stroke-width="22" stroke-linecap="round" stroke-linejoin="round"/>
  <g transform="translate(936 316)">
    <rect width="224" height="192" rx="36" fill="#ffffff"/>
    <text x="112" y="118" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-size="70" font-weight="900" fill="#1f2954">STD</text>
  </g>
  <text x="110" y="582" font-family="Segoe UI, Arial, sans-serif" font-size="28" font-weight="600" fill="#d7dffb">Configurable mappings, live updates, and scheduled batch standardization.</text>
</svg>
